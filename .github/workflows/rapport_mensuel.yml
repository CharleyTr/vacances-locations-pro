name: Rapport mensuel propriétaires

on:
  schedule:
    - cron: '0 7 1 * *'  # Le 1er de chaque mois à 7h00 UTC
  workflow_dispatch:       # Permettre le déclenchement manuel

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase requests reportlab pandas

      - name: Envoyer les rapports mensuels
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY:     ${{ secrets.BREVO_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
        run: python scripts/rapport_mensuel.py
