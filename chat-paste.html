<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLP — Envoyer une image</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:#F0F4FF; min-height:100vh; display:flex;
         align-items:center; justify-content:center; padding:1rem; }
  .card { background:white; border-radius:16px; padding:2rem;
          max-width:520px; width:100%; box-shadow:0 4px 24px rgba(21,101,192,.10); }
  .logo { text-align:center; font-size:40px; margin-bottom:.5rem; }
  h2 { text-align:center; color:#1565C0; font-size:1.3rem; margin-bottom:.3rem; }
  .sub { text-align:center; color:#888; font-size:.85rem; margin-bottom:1.5rem; }

  /* Zone de collage */
  #drop-zone {
    border:3px dashed #90CAF9; border-radius:12px; padding:2rem;
    text-align:center; cursor:pointer; transition:.2s; margin-bottom:1rem;
    background:#F8FBFF; min-height:120px; display:flex;
    align-items:center; justify-content:center; flex-direction:column; gap:.5rem;
  }
  #drop-zone.active { border-color:#1565C0; background:#E3F2FD; }
  #drop-zone:focus { outline:none; border-color:#1565C0; }
  .zone-icon { font-size:2rem; }
  .zone-text { color:#1565C0; font-weight:600; font-size:.95rem; }
  .zone-sub  { color:#90CAF9; font-size:.8rem; }

  #preview { display:none; width:100%; border-radius:8px; margin-bottom:1rem; max-height:300px; object-fit:contain; }

  input[type=text] {
    width:100%; padding:10px 14px; border:1.5px solid #E0E0E0;
    border-radius:8px; font-size:.9rem; margin-bottom:1rem;
    outline:none; transition:.2s;
  }
  input[type=text]:focus { border-color:#1565C0; }

  /* Config Supabase */
  .config { background:#F5F5F5; border-radius:8px; padding:1rem; margin-bottom:1rem; }
  .config label { font-size:.8rem; color:#666; display:block; margin-bottom:.3rem; }
  .config input { margin-bottom:.5rem; font-size:.8rem; }
  .config-toggle { color:#1565C0; font-size:.8rem; cursor:pointer; margin-bottom:.5rem; display:block; }

  button {
    width:100%; padding:12px; background:#1565C0; color:white;
    border:none; border-radius:10px; font-size:1rem; font-weight:600;
    cursor:pointer; transition:.2s;
  }
  button:hover { background:#0D47A1; }
  button:disabled { background:#90CAF9; cursor:not-allowed; }

  .status { margin-top:1rem; padding:10px 14px; border-radius:8px;
            font-size:.9rem; display:none; }
  .status.ok  { background:#E8F5E9; color:#2E7D32; display:block; }
  .status.err { background:#FFEBEE; color:#C62828; display:block; }

  .footer { text-align:center; margin-top:1.5rem; color:#CCC; font-size:.75rem; }
  .back-link { display:block; text-align:center; color:#90CAF9; font-size:.8rem;
               margin-top:.8rem; text-decoration:none; }
  .back-link:hover { color:#1565C0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏖️</div>
  <h2>Envoyer une image dans le Chat</h2>
  <p class="sub">Faites <strong>Ctrl+V</strong> dans la zone ci-dessous ou glissez une image</p>

  <!-- Zone collage/drag-drop -->
  <div id="drop-zone" tabindex="0">
    <div class="zone-icon">📋</div>
    <div class="zone-text">Ctrl+V ici — ou glissez une image</div>
    <div class="zone-sub">JPG, PNG, GIF, WebP acceptés</div>
  </div>
  <img id="preview" alt="Aperçu">

  <!-- Légende -->
  <input type="text" id="legende" placeholder="Légende (optionnel)...">

  <!-- Configuration Supabase (stockée en localStorage) -->
  <span class="config-toggle" onclick="toggleConfig()">⚙️ Configuration Supabase</span>
  <div class="config" id="config-panel" style="display:none">
    <label>URL Supabase</label>
    <input type="text" id="sb-url" placeholder="https://xxxx.supabase.co">
    <label>Clé anonyme (anon key)</label>
    <input type="text" id="sb-key" placeholder="eyJ...">
    <label>Votre email (pour identifier l'expéditeur)</label>
    <input type="text" id="user-email" placeholder="vous@email.fr">
    <label>Votre prénom</label>
    <input type="text" id="user-nom" placeholder="Charley">
  </div>

  <button id="btn-send" disabled>📤 Envoyer dans le Chat</button>
  <div class="status" id="status"></div>

  <a class="back-link" href="https://vacances-locations-pro-iqmuq8xq9g3kxgw6n8ogpv.streamlit.app" target="_blank">
    ↩ Retour à l'application
  </a>
</div>

<script>
// Config
var BUCKET = 'chat-attachments';
var TABLE  = 'chat_messages';

function loadConfig() {
  var cfg = JSON.parse(localStorage.getItem('vlp_chat_cfg') || '{}');
  if (cfg.url)   document.getElementById('sb-url').value   = cfg.url;
  if (cfg.key)   document.getElementById('sb-key').value   = cfg.key;
  if (cfg.email) document.getElementById('user-email').value = cfg.email;
  if (cfg.nom)   document.getElementById('user-nom').value = cfg.nom;
}
function saveConfig() {
  localStorage.setItem('vlp_chat_cfg', JSON.stringify({
    url:   document.getElementById('sb-url').value.trim(),
    key:   document.getElementById('sb-key').value.trim(),
    email: document.getElementById('user-email').value.trim(),
    nom:   document.getElementById('user-nom').value.trim(),
  }));
}
function toggleConfig() {
  var p = document.getElementById('config-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}
loadConfig();

// Données image courante
var currentBlob = null;
var currentMime = 'image/png';

function showPreview(blob, mime) {
  currentBlob = blob;
  currentMime = mime || 'image/png';
  var url = URL.createObjectURL(blob);
  var img = document.getElementById('preview');
  img.src = url;
  img.style.display = 'block';
  document.getElementById('drop-zone').innerHTML =
    '<div class="zone-icon">✅</div><div class="zone-text">Image prête</div><div class="zone-sub">Ctrl+V pour remplacer</div>';
  document.getElementById('btn-send').disabled = false;
}

// Ctrl+V
document.getElementById('drop-zone').addEventListener('paste', function(e) {
  var items = (e.clipboardData || window.clipboardData).items;
  for (var i=0; i<items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      showPreview(items[i].getAsFile(), items[i].type);
      return;
    }
  }
});

// Drag & Drop
var dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('active'); });
dz.addEventListener('dragleave', function()  { dz.classList.remove('active'); });
dz.addEventListener('drop', function(e) {
  e.preventDefault(); dz.classList.remove('active');
  var f = e.dataTransfer.files[0];
  if (f && f.type.indexOf('image') !== -1) showPreview(f, f.type);
});

// Focus auto
dz.addEventListener('click', function() { dz.focus(); });
window.onload = function() { dz.focus(); };

// Envoi
document.getElementById('btn-send').addEventListener('click', async function() {
  if (!currentBlob) return;
  saveConfig();
  var url   = document.getElementById('sb-url').value.trim();
  var key   = document.getElementById('sb-key').value.trim();
  var email = document.getElementById('user-email').value.trim() || 'chat@vlp.local';
  var nom   = document.getElementById('user-nom').value.trim() || email.split('@')[0];
  var leg   = document.getElementById('legende').value.trim() || '📸 Capture d\'écran';

  if (!url || !key) {
    showStatus('❌ Configurez l\'URL Supabase et la clé anonyme.', 'err');
    document.getElementById('config-panel').style.display = 'block';
    return;
  }

  var btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.textContent = '⏳ Envoi en cours...';
  showStatus('', '');

  try {
    // 1. Upload dans Storage
    var ext  = currentMime.split('/')[1] || 'png';
    var path = email.replace(/[@.]/g,'_') + '/' + Date.now() + '.' + ext;
    var buf  = await currentBlob.arrayBuffer();

    var r1 = await fetch(url + '/storage/v1/object/' + BUCKET + '/' + path, {
      method: 'POST',
      headers: { 'apikey': key, 'Authorization': 'Bearer ' + key,
                 'Content-Type': currentMime, 'x-upsert': 'true' },
      body: buf,
    });
    if (!r1.ok) throw new Error('Upload échoué: ' + r1.status + ' ' + await r1.text());

    // 2. Insérer le message
    var r2 = await fetch(url + '/rest/v1/' + TABLE, {
      method: 'POST',
      headers: { 'apikey': key, 'Authorization': 'Bearer ' + key,
                 'Content-Type': 'application/json',
                 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        contenu: leg, user_email: email, user_nom: nom,
        fichier_nom: 'capture.' + ext, fichier_path: path,
        fichier_type: 'image', fichier_mime: currentMime,
      }),
    });
    if (!r2.ok) throw new Error('Message échoué: ' + r2.status);

    showStatus('✅ Image envoyée dans le chat !', 'ok');
    currentBlob = null;
    document.getElementById('preview').style.display = 'none';
    document.getElementById('legende').value = '';
    dz.innerHTML = '<div class="zone-icon">📋</div><div class="zone-text">Ctrl+V ici — ou glissez une image</div><div class="zone-sub">JPG, PNG, GIF, WebP acceptés</div>';
    btn.textContent = '📤 Envoyer dans le Chat';
    btn.disabled = true;
    setTimeout(function(){ document.getElementById('status').style.display='none'; }, 4000);

  } catch(e) {
    showStatus('❌ ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '📤 Envoyer dans le Chat';
  }
});

function showStatus(msg, type) {
  var s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status' + (type ? ' '+type : '');
  if (type) s.style.display = 'block';
}
</script>
</body>
</html>
